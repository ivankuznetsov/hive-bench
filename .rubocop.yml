# Lightweight omakase-style config; the harness is stdlib-first Ruby.
AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false

plugins:
  - rubocop-minitest

# Prose-heavy benchmark code: don't fight long explanatory lines/methods.
Metrics:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/FrozenStringLiteralComment:
  Enabled: true
Layout/LineLength:
  Max: 140
Style/StringLiterals:
  EnforcedStyle: double_quotes
Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
Minitest/MultipleAssertions:
  Enabled: false
